name: Build Freeze Daemon

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK r27
        run: |
          echo "y" | sdkmanager "ndk;27.2.12479018"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Install host toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            clang llvm \
            libelf-dev zlib1g-dev \
            libbpf-dev \
            linux-headers-$(uname -r)

      - name: Compile eBPF program
        run: |
          clang -target bpf -O2 -g -mcpu=v2 \
            -D__TARGET_ARCH_arm64 \
            -I src \
            -I /usr/include \
            -c src/platform/freeze_monitor.bpf.c \
            -o freeze_monitor.bpf.o
          ls -lh freeze_monitor.bpf.o

      - name: Build libbpf for Android
        run: |
          # 优先使用 git clone，带重试
          for i in 1 2 3; do
            git clone --depth=1 https://github.com/NickCao/libbpf-android.git /tmp/libbpf-android && break
            sleep 5
          done
          # 若 git 失败，回退到 curl 下载 zip（带大小检查）
          if [ ! -d /tmp/libbpf-android ]; then
            echo "git clone failed, trying zip download"
            for i in 1 2 3; do
              curl -L --retry 3 --retry-delay 5 -H "User-Agent: Mozilla/5.0" \
                -o /tmp/libbpf-android.zip \
                https://github.com/NickCao/libbpf-android/archive/refs/heads/master.zip
              if [ -f /tmp/libbpf-android.zip ] && [ $(stat -c%s /tmp/libbpf-android.zip) -gt 1000 ]; then
                unzip -q /tmp/libbpf-android.zip -d /tmp
                mv /tmp/libbpf-android-master /tmp/libbpf-android
                break
              else
                rm -f /tmp/libbpf-android.zip
              fi
              sleep 5
            done
          fi
          if [ ! -d /tmp/libbpf-android ]; then
            echo "Failed to obtain libbpf-android"
            exit 1
          fi
          cd /tmp/libbpf-android
          export NDK=$NDK_HOME
          ./build.sh
          mkdir -p $GITHUB_WORKSPACE/prebuilt/libbpf/{lib,include/bpf}
          cp build/libbpf.a $GITHUB_WORKSPACE/prebuilt/libbpf/lib/
          cp -r libbpf/src/*.h $GITHUB_WORKSPACE/prebuilt/libbpf/include/bpf/
          echo "=== libbpf tree ==="
          ls -R $GITHUB_WORKSPACE/prebuilt/libbpf

      - name: Verify libbpf
        run: |
          if [ ! -f "$GITHUB_WORKSPACE/prebuilt/libbpf/lib/libbpf.a" ] || \
             [ ! -f "$GITHUB_WORKSPACE/prebuilt/libbpf/include/bpf/libbpf.h" ]; then
            echo "libbpf build failed"
            exit 1
          fi
          file $GITHUB_WORKSPACE/prebuilt/libbpf/lib/libbpf.a

      - name: Compile Daemon (arm64)
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=$NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-33 \
            -DANDROID_STL=c++_static \
            -DCMAKE_BUILD_TYPE=Release \
            -DLIBBPF_DIR=$GITHUB_WORKSPACE/prebuilt/libbpf
          cmake --build build --target freeze_daemon -j$(nproc)
          echo "Binary: $(ls -lh build/freeze_daemon)"

      - name: Package module
        run: |
          SAFE_REF="${GITHUB_REF_NAME//\//-}"
          PKG=module_package
          mkdir -p $PKG/{bin,config,webui,logs}

          cp module.prop                  $PKG/
          cp scripts/service.sh           $PKG/service.sh
          chmod +x $PKG/service.sh

          cp build/freeze_daemon          $PKG/bin/
          cp freeze_monitor.bpf.o         $PKG/bin/
          chmod +x $PKG/bin/freeze_daemon

          cp config/freeze.conf           $PKG/config/
          cp config/user_whitelist.txt    $PKG/config/
          cp config/system_blacklist.txt  $PKG/config/

          cp webui/index.html             $PKG/webui/

          cd $PKG
          zip -r ../freeze-daemon-${SAFE_REF}.zip .
          cd ..
          echo "Package: $(ls -lh freeze-daemon-${SAFE_REF}.zip)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: freeze-daemon-module
          path: freeze-daemon-*.zip
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: freeze-daemon-*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}