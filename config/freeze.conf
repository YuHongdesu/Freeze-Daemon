# Freeze Daemon 配置文件
# 修改后在 Web UI 保存，或重启 Daemon 后生效

# 应用切后台延迟冻结（毫秒）
bg_freeze_delay_ms=5000

# 息屏延迟全局冻结（毫秒）
screen_off_delay_ms=3000

# 系统反复解冻触发退避的次数上限
# 关闭系统 Freezer 后理论上不该再 bounce，调低更快进入退避
bounce_limit=2

# 退避后暂停管理的时间（毫秒）
bounce_backoff_ms=15000

# 系统自带 Freezer 已固定为关闭状态，不再作为可配置项
# 它与本模块的独立 cgroup 子树架构存在根本冲突，由 service.sh 和
# Daemon 内置的周期防御层（freeze_engine.h 的 freezer guard）共同确保其保持关闭

# 内存压缩（与 Freezer 无关，默认开启）
compaction_on=true

# 息屏时关闭 Wi-Fi 扫描
wifi_scan_off=false

# 深度休眠：息屏普通冻结完成后额外等待多久进入 Deep Doze（毫秒）
deep_sleep_delay_ms=30000

# 是否启用深度休眠（默认关闭，按需开启）
deep_sleep_on=false

# 是否对非白名单用户 App 剥夺后台 AppOp 权限（共 6 项）
user_appop_restrict=true
